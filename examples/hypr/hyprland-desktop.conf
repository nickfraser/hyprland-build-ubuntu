# Minimal example config for the desktop profile.

monitor=,preferred,auto,1

exec-once = waybar
exec-once = hyprpaper
exec-once = hypridle

input {
    kb_layout = us
    follow_mouse = 1
    touchpad {
        natural_scroll = true
    }
}

general {
    gaps_in = 5
    gaps_out = 10
    border_size = 2
}

decoration {
    rounding = 8
}

misc {
    disable_hyprland_logo = true
}

$mod = SUPER

bind = $mod, Return, exec, x-terminal-emulator
bind = $mod SHIFT, Q, exit
bind = $mod, Q, killactive
bind = $mod, F, fullscreen, 1
bind = $mod, Space, togglefloating
bind = $mod, H, movefocus, l
bind = $mod, L, movefocus, r
bind = $mod, K, movefocus, u
bind = $mod, J, movefocus, d
